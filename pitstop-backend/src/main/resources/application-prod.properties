spring.application.name=pitstop-backend

# Database — Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD automatically
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# JPA — safe for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — set JWT_SECRET env var in Railway dashboard
jwt.secret=${JWT_SECRET}

# CORS — set CORS_ALLOWED_ORIGINS env var to your Vercel URL after deploy
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# Gmail SMTP — set MAIL_PASSWORD env var in Railway dashboard
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pitstopsupport@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
